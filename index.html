<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
  <title>AA • Intelligence Monitor</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1c1f26;
      --bg-card: #272c35;
      --bg-card-hover: #2f3640;
      --border: #3a3f4a;
      --border-active: #5a6375;
      --text: #e8e8ed;
      --text-dim: #9ca3af;
      --text-faint: #6b7280;

      --c-intelligence: #ffcc33;
      --c-coding: #22ff99;
      --c-agentic: #44ddff;

      --c-up: #22ff88;
      --c-down: #ff4477;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent 0px, transparent 3px, rgba(0,0,0,0.07) 3px, transparent 4px);
      pointer-events: none;
      z-index: 9000;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(28,31,38,0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border-active);
      padding: 0 20px;
      height: 54px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand {
      font-family: 'VT323', monospace;
      font-size: 28px;
      color: var(--c-coding);
      text-shadow: 0 0 6px rgba(34,255,153,0.4);
      letter-spacing: 2px;
    }

    .search {
      flex: 1;
      max-width: 280px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px 6px 32px;
      font-size: 13px;
      border-radius: 4px;
    }

    .search:focus {
      outline: none;
      border-color: var(--c-coding);
      box-shadow: 0 0 0 2px rgba(34,255,153,0.2);
    }

    .tabs {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }

    .tab {
      padding: 6px 18px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab.active {
      background: var(--bg);
      color: var(--metric);
      border-color: var(--metric);
      box-shadow: 0 0 8px var(--metric-glow);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }

    .tier-badge {
      background: #111;
      color: #22ff88;
      padding: 2px 8px;
      font-size: 11px;
      border-radius: 2px;
      font-family: 'VT323', monospace;
    }

    .refresh-time {
      font-family: 'VT323', monospace;
      font-size: 15px;
      color: var(--text-dim);
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: flex-start;
      position: relative;
      min-height: 42px;
    }

    .header h1 {
      font-family: 'VT323', monospace;
      font-size: 38px;
      color: var(--metric);
      text-shadow: 0 0 8px var(--metric-glow);
      margin: 0;
    }

    .version-tag {
      font-size: 13px;
      color: var(--text-dim);
      background: rgba(0,0,0,0.3);
      padding: 4px 10px;
      border-radius: 3px;
    }

    .model-count {
      font-size: 13px;
      color: var(--text-dim);
      margin-left: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: 6px;
      padding: 18px;
      position: relative;
      transition: all 0.2s ease;
    }

    .card:hover {
      border-color: var(--metric);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 5px;
      background: var(--provider-color, #555);
    }

    .rank {
      font-family: 'VT323', monospace;
      font-size: 32px;
      color: var(--provider-color, #777);
      line-height: 1;
    }

    .movement {
      position: absolute;
      top: 18px;
      right: 18px;
      font-family: 'VT323', monospace;
      font-size: 18px;
    }

    .movement.up { color: var(--c-up); }
    .movement.down { color: var(--c-down); }

    .model-name {
      font-size: 15.5px;
      font-weight: 700;
      margin: 8px 0 6px;
    }

    .provider {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .provider-logo {
      width: 18px;
      height: 18px;
      object-fit: contain;
    }

    .score-pills {
      display: flex;
      gap: 8px;
      margin: 12px 0;
      justify-content: center;
    }

    .pill {
      font-size: 15px;
      font-weight: 700;
      padding: 6px 14px;
      border: 2px solid var(--border);
      color: var(--text-dim);
      border-radius: 6px;
      min-width: 52px;
      text-align: center;
      transition: all 0.2s ease;
      background: rgba(0,0,0,0.2);
    }

    .pill.active {
      border-color: var(--metric);
      color: var(--metric);
      background: rgba(34,255,153,0.15);
      box-shadow: 0 0 8px var(--metric-glow);
    }

    .pricing {
      margin-top: 12px;
      font-size: 11.5px;
      color: var(--text-dim);
      background: rgba(0,0,0,0.2);
      padding: 6px 10px;
      border-radius: 4px;
    }

    .loading-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-dim);
      font-family: 'VT323', monospace;
      font-size: 24px;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-faint);
      font-size: 11px;
    }

    @media (max-width: 900px) {
      .topbar {
        padding: 12px 14px;
        height: auto;
        row-gap: 10px;
      }

      .search {
        flex: 1 1 240px;
        max-width: none;
      }

      .tabs {
        width: 100%;
        margin-left: 0;
      }

      .status {
        width: 100%;
        margin-left: 0;
        justify-content: space-between;
      }

      .model-count {
        width: 100%;
        margin-left: 0;
        text-align: center;
      }
    }

    @media (max-width: 640px) {
      body {
        font-size: 11px;
      }

      .topbar {
        padding: 10px 8px;
        gap: 8px 10px;
      }

      .brand {
        font-size: clamp(22px, 6vw, 26px);
        letter-spacing: 1px;
      }

      .search {
        flex: 1 1 100%;
        width: 100%;
        max-width: none;
        padding: 8px 10px 8px 28px;
        font-size: 12px;
      }

      .tabs {
        gap: 6px;
      }

      .tab {
        flex: 1 1 0;
        text-align: center;
        padding: 8px 6px;
        font-size: 10px;
      }

      .status {
        gap: 8px;
        font-size: 11px;
      }

      .tier-badge {
        font-size: 10px;
      }

      .container {
        padding: 8px;
      }

      .header {
        gap: 8px;
        margin-bottom: 12px;
      }

      .header h1 {
        width: 100%;
        text-align: center;
        font-size: clamp(28px, 7vw, 32px);
      }

      .version-tag {
        font-size: 11px;
        padding: 3px 8px;
      }

      .model-count {
        font-size: 11px;
      }

      .grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: clamp(6px, 1.8vw, 8px);
      }

      .card {
        min-width: 0;
        padding: clamp(8px, 2.1vw, 10px);
        border-width: 1.5px;
        border-radius: 5px;
      }

      .card::before {
        width: 3px;
      }

      .rank {
        font-size: clamp(18px, 5vw, 22px);
      }

      .movement {
        top: 8px;
        right: 8px;
        font-size: clamp(11px, 3vw, 13px);
      }

      .model-name {
        font-size: clamp(10px, 2.8vw, 12px);
        line-height: 1.2;
        margin: 5px 0 4px;
        min-height: 2.4em;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        word-break: break-word;
      }

      .provider {
        gap: 5px;
        font-size: clamp(8px, 2.1vw, 10px);
        margin-bottom: 8px;
        min-width: 0;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .provider-logo {
        width: 12px;
        height: 12px;
        flex: 0 0 auto;
      }

      .score-pills {
        gap: 4px;
        margin: 8px 0 6px;
      }

      .pill {
        min-width: 0;
        flex: 1 1 0;
        padding: 4px 2px;
        font-size: clamp(9px, 2.2vw, 10px);
        border-width: 1.5px;
        border-radius: 4px;
        line-height: 1.1;
      }

      .pill b {
        display: block;
        font-size: 1.05em;
      }

      .pricing {
        margin-top: 8px;
        padding: 4px 6px;
        font-size: clamp(8px, 2vw, 9px);
        line-height: 1.3;
      }

      footer {
        padding: 24px 12px;
        font-size: 10px;
      }
    }

    @media (max-width: 420px) {
      .grid {
        gap: 6px;
      }

      .card {
        padding: 7px;
      }

      .movement {
        top: 6px;
        right: 6px;
      }

      .pricing {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">AA MONITOR</div>
    <input type="text" id="search" class="search" placeholder="filter models..." autocomplete="off">
    
    <div class="tabs">
      <div class="tab" data-metric="intelligence">INTELLIGENCE</div>
      <div class="tab active" data-metric="coding">CODING</div>
      <div class="tab" data-metric="agentic">AGENTIC</div>
    </div>

    <div class="status">
      <span id="tier" class="tier-badge">FREE</span>
      <span id="last-updated" class="last-updated">LAST UPDATED —</span>
    </div>
  </header>

  <div class="container">
    <div class="header">
      <h1 id="page-title">CODING INDEX</h1>
      <span id="version-tag" class="version-tag">v4.1</span>
      <span id="model-count" class="model-count">167 models with Coding score</span>
    </div>

    <div id="grid" class="grid">
      <!-- populated by JS -->
    </div>

    <footer>
      Data from artificialanalysis.ai • Auto-refreshes every 30 minutes
    </footer>
  </div>

  <script>
    let allModels = [];
    let rawModels = [];
    let currentMetric = 'coding';
    let searchTerm = '';

    function sortModelsForCurrentMetric(models) {
      const field = metricConfig[currentMetric].field;
      const sorted = [...models].sort((a, b) => {
        const sa = getScore(a, field);
        const sb = getScore(b, field);
        const va = sa ?? Number.NEGATIVE_INFINITY;
        const vb = sb ?? Number.NEGATIVE_INFINITY;
        return vb - va;
      });

      sorted.forEach((m, i) => m.originalRank = i + 1);
      return sorted;
    }

    function refreshCurrentView() {
      allModels = sortModelsForCurrentMetric(rawModels);
      render();
    }

    const metricConfig = {
      intelligence: { title: 'INTELLIGENCE INDEX', field: 'artificial_analysis_intelligence_index', color: '#ffcc33' },
      coding: { title: 'CODING INDEX', field: 'artificial_analysis_coding_index', color: '#22ff99' },
      agentic: { title: 'AGENTIC INDEX', field: 'artificial_analysis_agentic_index', color: '#44ddff' }
    };

    const providerColors = [
      '#ef4444','#10b981','#8b5cf6','#f59e0b','#06b67f','#6366f1','#ec4899','#14b8a6'
    ];

    function getProviderColor(name) {
      if (!name) return '#777';
      const n = name.toLowerCase();

      if (n.includes('claude') || n.includes('anthropic')) return '#ff7a00';
      if (n.includes('qwen')) return '#a855f7';
      if (n.includes('gpt') || n.includes('chatgpt') || n.includes('openai')) return '#f1f5f9';
      if (n.includes('gemini') || n.includes('google')) return '#3b82f6';
      if (n.includes('mimo')) return '#fb923c';
      if (n.includes('glm') || n.includes('z ai')) return '#111827';
      if (n.includes('deepseek')) return '#0ea5e9';
      if (n.includes('rerouted')) return '#a5b4fc'; // rerouted.dev

      let hash = 0;
      for (let i = 0; i < name.length; i++) {
        hash = name.charCodeAt(i) + ((hash << 5) - hash);
      }
      return providerColors[Math.abs(hash) % providerColors.length];
    }

    function getScore(model, field) {
      const evals = model.evaluations || {};
      const value = evals[field];
      if (value !== undefined && value !== null) return value;
      return null;
    }

    function updateCount() {
      const config = metricConfig[currentMetric];
      const validCount = allModels.filter(m => getScore(m, config.field) !== null).length;
      document.getElementById('model-count').textContent = `${validCount} models with ${config.title.split(' ')[0]} score`;
    }

    function updateLastUpdated(timestamp) {
      const el = document.getElementById('last-updated');
      const date = new Date(timestamp);
      const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      el.textContent = `LAST UPDATED ${timeStr}`;
    }

    function render() {
      const container = document.getElementById('grid');
      container.innerHTML = '';

      const config = metricConfig[currentMetric];
      const field = config.field;

      const filtered = allModels.filter(m => {
        const score = getScore(m, field);
        if (score === null) return false;
        if (!searchTerm) return true;
        const term = searchTerm.toLowerCase();
        return (m.name || '').toLowerCase().includes(term) || 
               (m.creator || m.model_creator?.name || '').toLowerCase().includes(term);
      });

      if (filtered.length === 0) {
        container.innerHTML = `<div class="loading-msg">NO MATCHES</div>`;
        return;
      }

      filtered.forEach(model => {
        const intScore = getScore(model, 'artificial_analysis_intelligence_index');
        const codScore = getScore(model, 'artificial_analysis_coding_index');
        const ageScore = getScore(model, 'artificial_analysis_agentic_index');

        const currentScore = getScore(model, field);
        const delta = model[config.field === 'artificial_analysis_intelligence_index' ? 'rankDeltaIntelligence' : 
                      config.field === 'artificial_analysis_coding_index' ? 'rankDeltaCoding' : 'rankDeltaAgentic'];

        let movement = '';
        if (delta !== null && delta !== undefined) {
          movement = delta > 0 ? 
            `<span class="movement up" style="color:var(--c-up)">▲${delta}</span>` : 
            `<span class="movement down" style="color:var(--c-down)">▼${Math.abs(delta)}</span>`;
        }

        const providerName = model.creator || model.model_creator?.name || 'Unknown';
        const providerColor = getProviderColor(providerName);

        const pills = [
          { label: 'INT', score: intScore, active: currentMetric === 'intelligence' },
          { label: 'COD', score: codScore, active: currentMetric === 'coding' },
          { label: 'AGE', score: ageScore, active: currentMetric === 'agentic' },
        ];

        const pillsHTML = pills.map(p => {
          const activeClass = p.active ? ' style="background:rgba(34,255,153,0.15);border-color:#22ff99;color:#22ff99"' : '';
          const val = p.score !== null ? Math.round(p.score) : '—';
          return `<span class="pill"${activeClass}>${p.label} <b>${val}</b></span>`;
        }).join('');

        const card = document.createElement('div');
        card.className = 'card';
        card.style.setProperty('--provider-color', providerColor);
        card.innerHTML = `
          <div class="rank" style="color:${providerColor}">#${model.originalRank || '?'}</div>
          ${movement}
          <div class="model-name">${model.name}</div>
          <div class="provider">${providerName}</div>
          <div class="score-pills">${pillsHTML}</div>
          ${model.pricing ? `<div class="pricing">$${model.pricing.price_1m_input_tokens || '—'} in / $${model.pricing.price_1m_output_tokens || '—'} out</div>` : ''}
        `;
        container.appendChild(card);
      });

      updateCount();
    }

    function setActiveTab(metric) {
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.metric === metric));
      currentMetric = metric;
      document.getElementById('page-title').textContent = metricConfig[metric].title;
      refreshCurrentView();
    }

    async function loadData() {
      const res = await fetch('/api/models');
      const data = await res.json();
      if (data.error) return;

      document.getElementById('tier').textContent = (data.tier || 'FREE').toUpperCase();
      if (data.intelligence_index_version) {
        document.getElementById('version-tag').textContent = `v${data.intelligence_index_version}`;
      }

      rawModels = data.models || [];
      refreshCurrentView();

      if (data.lastRefresh) {
        updateLastUpdated(data.lastRefresh);
      }

      render();
    }

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => setActiveTab(tab.dataset.metric));
    });

    document.getElementById('search').addEventListener('input', e => {
      searchTerm = e.target.value.trim();
      render();
    });

    loadData();
    setInterval(loadData, 120000);
  </script>
</body>
</html>
